services:
  postgres:
    image: postgres:16-alpine
    container_name: ngowamix-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ngowamix
      POSTGRES_PASSWORD: ngowamix_secret
      POSTGRES_DB: ngowamix
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ngowamix"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ngowamix-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
