services:
  - type: web
    name: ngowamix-api
    runtime: node
    plan: free
    rootDir: apps/api
    buildCommand: cd ../.. && pnpm install && cd apps/api && pnpm prisma generate && pnpm build
    startCommand: pnpm start:prod
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://ngowamix.com
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 10000
      - key: REDIS_URL
        sync: false
